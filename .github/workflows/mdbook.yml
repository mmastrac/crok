name: Deploy mdBook site to Pages

on:
  # Run on pushes to master or pull requests to master
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.5.2
      MDBOOK_LINKCHECK_VERSION: 0.7.7
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install mdbook from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook
          version: ${{ env.MDBOOK_VERSION }}
      - name: Install mdbook-linkcheck from crates.io
        uses: baptiste0928/cargo-install@v3
        with:
          crate: mdbook-linkcheck
          version: ${{ env.MDBOOK_LINKCHECK_VERSION }}
      - name: Cargo build
        run: cargo build --bin mdbook-crok -p crok-mdbook
      - name: Add target/ to path
        run: echo "PATH=$PATH:$PWD/target/debug/" >> "$GITHUB_ENV"
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with mdBook
        run: mdbook build doc/
      - name: List book files
        run: find ./doc/book/ -type f
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./doc/book/

  # Deployment job
  deploy:
    if: github.event_name != 'pull_request'
    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
